# Config for vanilla MACE training using 10_mace_training.py

data:
  zarr_path: /path/to/r2scan-2025.2-train.zarr
  validation_zarr_path: /path/to/r2scan-2025.2-valid.zarr
  stress_unit: kBar

training:
  epochs: null
  steps: 68000
  batch_size: 32
  log_every_steps: 100
  metrics:
    jsonl_path: outputs/metrics.jsonl
    logger_axis: step
  seed: 42
  dataloader:
    drop_last: true
  validation:
    enabled: true
    every_steps: 1000
    batch_size: 64
    max_batches: null
  ema:
    enabled: true
    decay: 0.995
    update_every: 1
    start_step: 0
  checkpoint:
    enabled: true
    dir: outputs/checkpoints
    step_interval: 10000
    save_final: true
  restart:
    enabled: false
    dir: outputs/checkpoints
  distributed:
    enabled: true
    backend: nccl
  loss:
    energy_weight: 1.0
    force_weight: 10.0
    stress_weight: 100.0
    huber_delta: 0.01
    stage_two:
      start_step: 54400
      energy_weight: 10.0
      force_weight: 1.0
      stress_weight: 10.0
  optimizer:
    lr: 0.005
    stage_two_lr: 0.001
    weight_decay: 1e-3
    clip_grad: 2.0
  scheduler:
    enabled: true
    type: cosine
    # first_stage_steps defaults to training.loss.stage_two.start_step so
    # the LR switch and loss-weight step boundary share the same step.
    first_stage_steps: 54400
    eta_min: 0.001

model:
  model_type: mace
  dtype: float32
  charge_mlp_irreps: "16x0e"
  hidden_irreps: "128x0e + 128x1o"
  num_interactions: 2
  num_bessel: 10
  num_polynomial_cutoff: 5
  max_ell: 3
  mlp_irreps: "16x0e"
  correlation: 3
  heads: ["default"]
  cueq:
    enabled: true
    optimize_all: true
  r_max: 5.0
  avg_num_neighbors: 31.25404652980629
  atomic_inter_shift: 0.145741179795108
  atomic_inter_scale: 1.822297094894926
