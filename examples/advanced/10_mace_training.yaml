data:
  zarr_path: /path/to/r2scan-2025.2-train.zarr
  validation_zarr_path: /path/to/r2scan-2025.2-valid.zarr
  charge_target_key: ddec6_partial_charges
  stress_unit: kBar

training:
  epochs: null
  steps: 68000
  batch_size: 32
  log_every_steps: 100
  logging:
    jsonl_path: outputs/metrics.jsonl
    logger_axis: step
  seed: 42
  dataloader:
    drop_last: true
    skip_validation: true
  validation:
    enabled: true
    every_steps: 5000
    batch_size: 64
    max_batches: null
  ema:
    enabled: true
    decay: 0.995
    update_every: 1
    start_step: 0
  checkpoint:
    enabled: true
    dir: outputs/checkpoints
    step_interval: 10000
    save_final: true
  restart:
    enabled: false
    dir: outputs/checkpoints
  distributed:
    enabled: true
    backend: nccl
  loss:
    energy_weight: 1.0
    force_weight: 10.0
    stress_weight: 10.0
    charge_weight: 0.05
    huber_delta: 0.01
    conditional_force_huber: true
    stage_two:
      start_step: 54400
      energy_weight: 10.0
      force_weight: 1.0
      stress_weight: 10.0
      charge_weight: 0.05
  optimizer:
    lr: 0.005
    stage_two_lr: 0.001
    weight_decay: 1e-5
    clip_grad: 5.0
  scheduler:
    enabled: true
    type: cosine
    # Defaults to training.loss.stage_two.start_step so the LR switch and
    # loss-weight step boundary share the same step.
    first_stage_steps: 54400
    eta_min: 0.001

model:
  model_type: charged_mace
  dtype: float32
  charge_mlp_irreps: "16x0e"
  charge_weight_transform: exp # Options: exp, square
  hidden_irreps: "128x0e + 128x1o"
  num_interactions: 2
  num_bessel: 10
  num_polynomial_cutoff: 5
  max_ell: 3
  mlp_irreps: "16x0e"
  correlation: 3
  heads: ["default"]
  cueq:
    enabled: true
    optimize_all: true
  ewald:
    accuracy: 1e-4
  r_max: 5.0
  avg_num_neighbors: 31.26582868498974
  atomic_inter_shift: 0.0
  atomic_inter_scale: 1.8222970948949255
